<svg width="100%" viewBox="0 0 680 330" role="img" xmlns="http://www.w3.org/2000/svg">
<title>TCN_v2 horizontal architecture</title>
<desc>TCN_v2 architecture laid out left to right: input, five TemporalBlocks, concat with covariate projection, fc_head, output</desc>
<defs>
  <marker id="arr" viewBox="0 0 10 10" refX="8" refY="5" markerWidth="6" markerHeight="6" orient="auto-start-reverse">
    <path d="M2 1L8 5L2 9" fill="none" stroke="context-stroke" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"/>
  </marker>
  <style>
    text { font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif; fill: #1a1a1a; }
    .th  { font-size: 14px; font-weight: 500; }
    .ts  { font-size: 12px; font-weight: 400; fill: #555; }
    .c-gray rect   { fill: #F1EFE8; stroke: #888780; }
    .c-gray .th    { fill: #2C2C2A; }
    .c-gray .ts    { fill: #5F5E5A; }
    .c-blue rect   { fill: #E6F1FB; stroke: #185FA5; }
    .c-blue .th    { fill: #0C447C; }
    .c-blue .ts    { fill: #185FA5; }
    .c-amber rect  { fill: #FAEEDA; stroke: #854F0B; }
    .c-amber .th   { fill: #633806; }
    .c-amber .ts   { fill: #854F0B; }
    .c-teal rect   { fill: #E1F5EE; stroke: #0F6E56; }
    .c-teal .th    { fill: #085041; }
    .c-teal .ts    { fill: #0F6E56; }
    .c-purple rect { fill: #EEEDFE; stroke: #534AB7; }
    .c-purple .th  { fill: #3C3489; }
    .c-purple .ts  { fill: #534AB7; }
    .arr { stroke: #888780; stroke-width: 1.5; fill: none; }
  </style>
</defs>

<!-- Title -->
<text class="th" x="340" y="22" text-anchor="middle">TCN_v2 — Temporal Convolutional Network</text>

<!-- INPUT -->
<g class="c-gray">
  <rect x="14" y="96" width="84" height="56" rx="6" stroke-width="0.5"/>
  <text class="th" x="56" y="119" text-anchor="middle" dominant-baseline="central">Input x</text>
  <text class="ts" x="56" y="137" text-anchor="middle" dominant-baseline="central">(B, F, 336)</text>
</g>
<line x1="98" y1="124" x2="112" y2="124" class="arr" marker-end="url(#arr)"/>

<!-- TBLOCK 1 -->
<g class="c-blue">
  <rect x="114" y="84" width="100" height="80" rx="6" stroke-width="0.5"/>
  <text class="th" x="164" y="108" text-anchor="middle" dominant-baseline="central">TBlock 1</text>
  <text class="ts" x="164" y="126" text-anchor="middle" dominant-baseline="central">F→32, d=1</text>
  <text class="ts" x="164" y="142" text-anchor="middle" dominant-baseline="central">k=7, ×2</text>
  <text class="ts" x="164" y="157" text-anchor="middle" dominant-baseline="central">+ residual</text>
</g>
<line x1="214" y1="124" x2="228" y2="124" class="arr" marker-end="url(#arr)"/>

<!-- TBLOCK 2 -->
<g class="c-blue">
  <rect x="230" y="84" width="100" height="80" rx="6" stroke-width="0.5"/>
  <text class="th" x="280" y="108" text-anchor="middle" dominant-baseline="central">TBlock 2</text>
  <text class="ts" x="280" y="126" text-anchor="middle" dominant-baseline="central">32→64, d=2</text>
  <text class="ts" x="280" y="142" text-anchor="middle" dominant-baseline="central">k=7, ×2</text>
  <text class="ts" x="280" y="157" text-anchor="middle" dominant-baseline="central">+ residual</text>
</g>
<line x1="330" y1="124" x2="344" y2="124" class="arr" marker-end="url(#arr)"/>

<!-- TBLOCK 3 -->
<g class="c-blue">
  <rect x="346" y="84" width="100" height="80" rx="6" stroke-width="0.5"/>
  <text class="th" x="396" y="108" text-anchor="middle" dominant-baseline="central">TBlock 3</text>
  <text class="ts" x="396" y="126" text-anchor="middle" dominant-baseline="central">64→128, d=4</text>
  <text class="ts" x="396" y="142" text-anchor="middle" dominant-baseline="central">k=7, ×2</text>
  <text class="ts" x="396" y="157" text-anchor="middle" dominant-baseline="central">+ residual</text>
</g>
<line x1="446" y1="124" x2="460" y2="124" class="arr" marker-end="url(#arr)"/>

<!-- TBLOCK 4-5 -->
<g class="c-blue">
  <rect x="462" y="84" width="104" height="80" rx="6" stroke-width="0.5"/>
  <text class="th" x="514" y="108" text-anchor="middle" dominant-baseline="central">TBlock 4–5</text>
  <text class="ts" x="514" y="126" text-anchor="middle" dominant-baseline="central">128→256, d=8</text>
  <text class="ts" x="514" y="142" text-anchor="middle" dominant-baseline="central">k=7, ×2</text>
  <text class="ts" x="514" y="157" text-anchor="middle" dominant-baseline="central">+ residual</text>
</g>
<line x1="566" y1="124" x2="580" y2="124" class="arr" marker-end="url(#arr)"/>

<!-- LAST TIMESTEP LABEL -->
<text class="ts" x="584" y="116" dominant-baseline="central">[:,-1]</text>
<text class="ts" x="584" y="130" dominant-baseline="central">(B,256)</text>

<!-- INTERNAL NOTE -->
<text class="ts" x="280" y="176" text-anchor="middle">LayerNorm → Conv1d → GELU → Dropout  ×2</text>

<!-- FUTURE COVARIATES -->
<g class="c-amber">
  <rect x="230" y="230" width="120" height="56" rx="6" stroke-width="0.5"/>
  <text class="th" x="290" y="251" text-anchor="middle" dominant-baseline="central">Future cov.</text>
  <text class="ts" x="290" y="269" text-anchor="middle" dominant-baseline="central">(B,24,4)→flat</text>
</g>
<line x1="350" y1="258" x2="366" y2="258" class="arr" marker-end="url(#arr)"/>

<!-- COV_PROJ -->
<g class="c-amber">
  <rect x="368" y="236" width="100" height="44" rx="6" stroke-width="0.5"/>
  <text class="th" x="418" y="255" text-anchor="middle" dominant-baseline="central">cov_proj</text>
  <text class="ts" x="418" y="271" text-anchor="middle" dominant-baseline="central">Linear 96→64</text>
</g>
<line x1="468" y1="258" x2="484" y2="258" class="arr" marker-end="url(#arr)"/>

<!-- CONCAT -->
<g class="c-teal">
  <rect x="486" y="192" width="90" height="80" rx="6" stroke-width="0.5"/>
  <text class="th" x="531" y="220" text-anchor="middle" dominant-baseline="central">Concat</text>
  <text class="ts" x="531" y="238" text-anchor="middle" dominant-baseline="central">256 + 64</text>
  <text class="ts" x="531" y="254" text-anchor="middle" dominant-baseline="central">= (B, 320)</text>
</g>

<!-- last timestep → concat -->
<path d="M606 138 L606 165 L531 165 L531 192" fill="none" stroke="#888780" stroke-width="1" marker-end="url(#arr)"/>
<!-- cov_proj → concat -->
<path d="M531 258 L531 272" fill="none" stroke="#888780" stroke-width="1"/>

<!-- FC_HEAD -->
<line x1="576" y1="232" x2="590" y2="232" class="arr" marker-end="url(#arr)"/>
<g class="c-purple">
  <rect x="592" y="192" width="80" height="80" rx="6" stroke-width="0.5"/>
  <text class="th" x="632" y="215" text-anchor="middle" dominant-baseline="central">fc_head</text>
  <text class="ts" x="632" y="233" text-anchor="middle" dominant-baseline="central">LN→128</text>
  <text class="ts" x="632" y="249" text-anchor="middle" dominant-baseline="central">GELU→Drop</text>
  <text class="ts" x="632" y="265" text-anchor="middle" dominant-baseline="central">→24</text>
</g>

<!-- OUTPUT -->
<text class="th" x="632" y="288" text-anchor="middle">pred (B, 24)</text>

<!-- RF ANNOTATION -->
<text class="ts" x="340" y="310" text-anchor="middle">RF = 1 + 2×(7−1)×(1+2+4+8+16) = 373  ≥  seq_len 336  ✓</text>

</svg>
