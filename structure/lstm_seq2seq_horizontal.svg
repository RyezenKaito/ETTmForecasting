<svg width="100%" viewBox="0 0 700 330" role="img" xmlns="http://www.w3.org/2000/svg">
<title>LSTM Seq2Seq horizontal architecture</title>
<desc>Encoder-Decoder LSTM architecture laid out left to right</desc>
<defs>
  <marker id="arr" viewBox="0 0 10 10" refX="8" refY="5" markerWidth="6" markerHeight="6" orient="auto-start-reverse">
    <path d="M2 1L8 5L2 9" fill="none" stroke="context-stroke" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"/>
  </marker>
  <style>
    text { font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif; fill: #1a1a1a; }
    .th  { font-size: 14px; font-weight: 600; }
    .ts  { font-size: 12px; font-weight: 400; fill: #555; }
    .c-gray rect  { fill: #F1EFE8; stroke: #888780; }
    .c-blue rect  { fill: #E6F1FB; stroke: #185FA5; }
    .c-blue .th   { fill: #0C447C; }
    .c-blue .ts   { fill: #185FA5; }
    .c-teal rect  { fill: #E1F5EE; stroke: #0F6E56; }
    .c-teal .th   { fill: #085041; }
    .c-teal .ts   { fill: #0F6E56; }
    .c-purple rect { fill: #EEEDFE; stroke: #534AB7; }
    .c-purple .th  { fill: #3C3489; }
    .c-purple .ts  { fill: #534AB7; }
    .c-coral rect  { fill: #FAECE7; stroke: #993C1D; }
    .c-coral .th   { fill: #712B13; }
    .c-coral .ts   { fill: #993C1D; }
    .arr { stroke: #888780; stroke-width: 1.5; fill: none; }
  </style>
</defs>

<!-- Title -->
<text class="th" x="350" y="24" text-anchor="middle">LSTM Seq2Seq — Encoder–Decoder</text>

<!-- INPUT -->
<g class="c-gray">
  <rect x="20" y="100" width="96" height="56" rx="6" stroke-width="0.5"/>
  <text class="th" x="68" y="122" text-anchor="middle">Input x</text>
  <text class="ts" x="68" y="142" text-anchor="middle">(B, 336, F)</text>
</g>
<line x1="116" y1="128" x2="134" y2="128" class="arr" marker-end="url(#arr)"/>

<!-- ENCODER LSTM -->
<g class="c-blue">
  <rect x="136" y="88" width="118" height="80" rx="6" stroke-width="0.5"/>
  <text class="th" x="195" y="112" text-anchor="middle">Encoder LSTM</text>
  <text class="ts" x="195" y="130" text-anchor="middle">hidden=128</text>
  <text class="ts" x="195" y="148" text-anchor="middle">layers=2, drop=0.3</text>
</g>
<line x1="254" y1="128" x2="274" y2="128" class="arr" marker-end="url(#arr)"/>

<!-- HIDDEN STATES -->
<g class="c-teal">
  <rect x="276" y="100" width="110" height="56" rx="6" stroke-width="0.5"/>
  <text class="th" x="331" y="122" text-anchor="middle">Hidden (h, c)</text>
  <text class="ts" x="331" y="142" text-anchor="middle">(layers, B, 128)</text>
</g>
<line x1="386" y1="128" x2="406" y2="128" class="arr" marker-end="url(#arr)"/>

<!-- DECODER INPUT -->
<g class="c-gray">
  <rect x="392" y="220" width="114" height="44" rx="6" stroke-width="0.5"/>
  <text class="th" x="449" y="237" text-anchor="middle">Decoder input</text>
  <text class="ts" x="449" y="255" text-anchor="middle">last known target</text>
</g>
<line x1="449" y1="220" x2="449" y2="194" class="arr" marker-end="url(#arr)"/>

<!-- DECODER LSTM -->
<g class="c-purple">
  <rect x="408" y="88" width="122" height="80" rx="6" stroke-width="0.5"/>
  <text class="th" x="469" y="112" text-anchor="middle">Decoder LSTM</text>
  <text class="ts" x="469" y="130" text-anchor="middle">input=1 → 128</text>
  <text class="ts" x="469" y="148" text-anchor="middle">unroll t=0..23</text>
</g>
<line x1="530" y1="128" x2="548" y2="128" class="arr" marker-end="url(#arr)"/>

<!-- FC_OUT -->
<g class="c-coral">
  <rect x="550" y="100" width="92" height="56" rx="6" stroke-width="0.5"/>
  <text class="th" x="596" y="120" text-anchor="middle">Linear</text>
  <text class="ts" x="596" y="136" text-anchor="middle">fc_out</text>
  <text class="ts" x="596" y="150" text-anchor="middle">128 → 1</text>
</g>
<line x1="642" y1="128" x2="660" y2="128" class="arr" marker-end="url(#arr)"/>

<!-- OUTPUT -->
<text class="th" x="664" y="122">pred</text>
<text class="ts" x="664" y="138">(B, 24)</text>

<!-- TEACHER FORCING LOOP -->
<path d="M596 156 L596 198 L469 198 L469 168" fill="none" stroke="#888780" stroke-width="1" stroke-dasharray="5 3" marker-end="url(#arr)"/>
<text class="ts" x="530" y="213" text-anchor="middle">teacher forcing p=0.5</text>
<text class="ts" x="530" y="228" text-anchor="middle">(train only)</text>

<!-- LOOP ANNOTATION -->
<text class="ts" x="469" y="70" text-anchor="middle">× 24 steps</text>
<path d="M430 82 Q430 66 469 66 Q508 66 508 82" fill="none" stroke="#aaa" stroke-width="0.8" stroke-dasharray="3 2"/>

</svg>
